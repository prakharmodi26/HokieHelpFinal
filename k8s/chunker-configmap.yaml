apiVersion: v1
kind: ConfigMap
metadata:
  name: chunker-config
  namespace: test
  labels:
    app: hokiehelp-chunker
data:
  MINIO_ENDPOINT: "minio:9000"
  MINIO_CLEANED_BUCKET: "crawled-pages-cleaned"
  MINIO_CHUNKS_BUCKET: "chunks"
  MINIO_SECURE: "false"
  CHUNK_PREFERRED_TOKENS: "400"
  CHUNK_OVERLAP_TOKENS: "64"
  CHUNK_MIN_TOKENS: "120"
