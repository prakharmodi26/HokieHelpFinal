apiVersion: apps/v1
kind: Deployment
metadata:
  name: hokiehelp-frontend
  namespace: test
  labels:
    app: hokiehelp-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hokiehelp-frontend
  template:
    metadata:
      labels:
        app: hokiehelp-frontend
    spec:
      securityContext:
        fsGroup: 101
      containers:
        - name: frontend
          image: ghcr.io/prakharmodi26/hokiehelp-frontend:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: test
  labels:
    app: hokiehelp-frontend
spec:
  selector:
    app: hokiehelp-frontend
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
