# ServiceAccount for the pipeline orchestrator
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hokiehelp-pipeline
  namespace: test
  labels:
    app: hokiehelp-pipeline
---
# Role: create, get, watch, list, delete Jobs and read pod logs/events
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hokiehelp-pipeline-role
  namespace: test
  labels:
    app: hokiehelp-pipeline
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
---
# Bind the role to the service account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hokiehelp-pipeline-binding
  namespace: test
  labels:
    app: hokiehelp-pipeline
subjects:
  - kind: ServiceAccount
    name: hokiehelp-pipeline
    namespace: test
roleRef:
  kind: Role
  name: hokiehelp-pipeline-role
  apiGroup: rbac.authorization.k8s.io
