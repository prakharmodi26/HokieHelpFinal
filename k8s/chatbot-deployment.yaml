apiVersion: apps/v1
kind: Deployment
metadata:
  name: hokiehelp-chatbot
  namespace: test
  labels:
    app: hokiehelp-chatbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hokiehelp-chatbot
  template:
    metadata:
      labels:
        app: hokiehelp-chatbot
    spec:
      containers:
        - name: chatbot
          image: ghcr.io/prakharmodi26/hokiehelp-chatbot:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: chatbot-config
          env:
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-api-secret
                  key: api-key
          resources:
            requests:
              memory: "4Gi"
              cpu: "500m"
              nvidia.com/gpu: "1"
            limits:
              memory: "8Gi"
              cpu: "2000m"
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: chatbot
  namespace: test
  labels:
    app: hokiehelp-chatbot
spec:
  selector:
    app: hokiehelp-chatbot
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
