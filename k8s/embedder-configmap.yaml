apiVersion: v1
kind: ConfigMap
metadata:
  name: embedder-config
  namespace: test
  labels:
    app: hokiehelp-embedder
data:
  MINIO_ENDPOINT: "minio:9000"
  MINIO_CHUNKS_BUCKET: "chunks"
  MINIO_SECURE: "false"
  QDRANT_HOST: "qdrant"
  QDRANT_PORT: "6333"
  QDRANT_COLLECTION: "hokiehelp_chunks"
  EMBEDDING_MODEL: "BAAI/bge-large-en-v1.5"
  EMBEDDING_BATCH_SIZE: "32"
