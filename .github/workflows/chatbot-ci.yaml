name: Chatbot CI

on:
  push:
    branches: [main]
    paths:
      - "services/chatbot/**"
      - ".github/workflows/chatbot-ci.yaml"
  pull_request:
    branches: [main]
    paths:
      - "services/chatbot/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: prakharmodi26/hokiehelp-chatbot

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/chatbot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --extra-index-url https://download.pytorch.org/whl/cpu ".[dev]"
      - run: pytest -v

  build-and-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        with:
          context: services/chatbot
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
