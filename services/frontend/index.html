<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HokieHelp — Virginia Tech CS Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header id="app-header">
            <div class="header-inner">
                <div class="logo-group">
                    <img src="assets/images/logo-header.png" alt="Virginia Tech" class="logo-header">
                    <div class="logo-divider"></div>
                    <div class="logo-text">
                        <h1>HokieHelp</h1>
                        <span class="logo-subtitle">CS AI Assistant</span>
                    </div>
                </div>
                <button id="new-chat-btn" title="New conversation" aria-label="New conversation">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    <span>New chat</span>
                </button>
            </div>
        </header>

        <!-- Chat Area -->
        <main id="chat-container">
            <div id="messages"></div>
            <div id="typing-indicator" class="hidden">
                <div class="typing-avatar">
                    <img src="assets/images/vt-mark-orange.svg" alt="VT">
                </div>
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </main>

        <!-- Input Area -->
        <div id="input-area">
            <form id="chat-form">
                <div class="input-wrapper">
                    <input
                        type="text"
                        id="question-input"
                        placeholder="Ask about Virginia Tech CS..."
                        autocomplete="off"
                        maxlength="2000"
                        required
                    >
                    <button type="submit" id="send-btn" aria-label="Send message">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                    </button>
                </div>
                <p class="input-hint">HokieHelp answers from website.cs.vt.edu knowledge base. HokieHelp can make mistakes. Please verify with linked sources.</p>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
